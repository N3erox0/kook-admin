# KOOK Admin Nginx 配置
# 用法：
#   1. cp nginx/kook-admin.conf /etc/nginx/sites-available/kook-admin
#   2. ln -s /etc/nginx/sites-available/kook-admin /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d 22bngm.online --non-interactive --agree-tos -m your@email.com
#
# Certbot 会自动添加 SSL 配置和 HTTP→HTTPS 跳转

# HTTP → HTTPS 跳转（certbot 自动生成，此处预留）
server {
    listen 80;
    server_name 22bngm.online;

    # certbot 验证用（勿删）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他请求跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    server_name 22bngm.online;

    # SSL 证书路径（certbot 自动填充）
    # ssl_certificate /etc/letsencrypt/live/22bngm.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/22bngm.online/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 前端静态文件
    root /opt/kook-admin/client/dist;
    index index.html;

    # 上传文件目录（装备图片等）
    location /uploads/ {
        alias /opt/kook-admin/server/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 → NestJS 后端
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时（OCR/图片下载可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # 请求体大小（图片上传）
        client_max_body_size 20m;
    }

    # 前端 SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
